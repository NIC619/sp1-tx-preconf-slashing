name: Network Proof E2E

on:
  workflow_dispatch:
    inputs:
      proof_system:
        description: Proof system to use for generated-fixture E2E
        required: false
        default: groth16
        type: choice
        options:
          - groth16
          - plonk
  release:
    types:
      - published
      - prereleased

env:
  FOUNDRY_PROFILE: ci
  FOUNDRY_OFFLINE: true

jobs:
  network-proof-e2e:
    name: Generate Network Proof And Verify Fixture
    runs-on: ubuntu-latest
    environment:
      name: paid-network-proof-e2e
    env:
      SP1_PROVER: network
      NETWORK_PRIVATE_KEY: ${{ secrets.NETWORK_PRIVATE_KEY }}
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
      PROOF_SYSTEM: ${{ github.event.inputs.proof_system || 'groth16' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ~/.sp1
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Cache Foundry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            contracts/cache
            contracts/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/lib/**') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Install SP1 toolchain
        run: |
          curl -L https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up
          ~/.sp1/bin/cargo-prove prove --version

      - name: Build SP1 program
        run: |
          cd program
          ~/.sp1/bin/cargo-prove prove build

      - name: Run generated fixture E2E
        env:
          INCLUDED_TX: ${{ vars.INCLUDED_TX || '' }}
        run: |
          if [ -z "${NETWORK_PRIVATE_KEY}" ]; then
            echo "NETWORK_PRIVATE_KEY environment secret is required for network proof E2E" >&2
            exit 1
          fi

          if [ -z "${ETH_RPC_URL}" ]; then
            echo "ETH_RPC_URL secret is required for network proof E2E" >&2
            exit 1
          fi

          FIXTURE_PATH="${PWD}/contracts/src/fixtures/${PROOF_SYSTEM}-e2e-${GITHUB_RUN_ID}.json"

          if [ -n "${INCLUDED_TX}" ]; then
            TX_INCLUSION_E2E_FIXTURE_PATH="${FIXTURE_PATH}" \
            ./scripts/run_generated_fixture_e2e.sh "${PROOF_SYSTEM}" \
              --eth-rpc-url "${ETH_RPC_URL}" \
              --transaction-hash "${INCLUDED_TX}"
          else
            TX_INCLUSION_E2E_FIXTURE_PATH="${FIXTURE_PATH}" \
            ./scripts/run_generated_fixture_e2e.sh "${PROOF_SYSTEM}" \
              --eth-rpc-url "${ETH_RPC_URL}"
          fi

      - name: Write workflow summary
        if: always()
        env:
          FIXTURE_PATH: ${{ github.workspace }}/contracts/src/fixtures/${{ github.event.inputs.proof_system || 'groth16' }}-e2e-${{ github.run_id }}.json
        run: |
          if [ ! -f "${FIXTURE_PATH}" ]; then
            {
              echo "## Network Proof E2E"
              echo
              echo "No generated fixture was found at \`${FIXTURE_PATH}\`."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os

          fixture_path = os.environ["FIXTURE_PATH"]
          proof_system = os.environ.get("PROOF_SYSTEM", "groth16")

          with open(fixture_path, "r", encoding="utf-8") as f:
              fixture = json.load(f)

          summary = f"""## Network Proof E2E

          | Field | Value |
          | --- | --- |
          | Proof system | `{proof_system}` |
          | Block number | `{fixture["blockNumber"]}` |
          | Transaction index | `{fixture["transactionIndex"]}` |
          | Transaction hash | `{fixture["transactionHash"]}` |
          | Block hash | `{fixture["blockHash"]}` |
          | Included | `{fixture["isIncluded"]}` |
          | Fixture path | `{fixture_path}` |
          """

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write(summary + "\n")
          PY

      - name: Upload generated fixtures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-proof-fixtures-${{ github.run_id }}
          path: contracts/src/fixtures/*-e2e-*.json
          if-no-files-found: ignore
