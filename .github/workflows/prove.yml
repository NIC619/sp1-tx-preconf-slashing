name: Build Program

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    strategy:
      fail-fast: true

    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-directories: |
            ~/.cargo/bin/
          shared-key: sp1-host-rust-1.91.1

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install SP1 toolchain
        run: |
          curl -L https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up 
          ~/.sp1/bin/cargo-prove prove --version

      - name: Install SP1 native runner override
        run: |
          cargo install sp1-core-executor-runner-binary --version 6.1.0 --root "$RUNNER_TEMP/sp1-core-runner" --force
          echo "SP1_CORE_RUNNER_OVERRIDE_BINARY=$RUNNER_TEMP/sp1-core-runner/bin/sp1-core-executor-runner-binary" >> "$GITHUB_ENV"

      - name: Build SP1 program
        run: |
          cd program
          ~/.sp1/bin/cargo-prove prove build

      - name: Run Rust tests
        run: cargo test -p tx-inclusion-precise-index -p tx-inclusion-precise-index-lib

      - name: Execute SP1 program
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          cd script
          cargo run --release -- --execute
